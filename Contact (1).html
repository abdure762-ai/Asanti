<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - asanti</title>
<div class="logo"Asanti>
  <div class="navbar">
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html"class="active">Contact</a>
    <a href="service.html">Service</a>
  </div>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  background:#0f172a;
  color:white;
}

/* Header */
header{
  background:#020617;
  padding:15px 10%;
  display:flex;
  justify-content:space-between;
}

.logo{
  color:#38bdf8;
  font-weight:bold;
}

.navbar a{
  margin-left:20px;
  text-decoration:none;
  color:white;
}

/* Section */
.contact{
  padding:60px 10%;
  text-align:center;
}

.contact h1{
  color:#38bdf8;
  margin-bottom:20px;
}

/* Form */
.form{
  max-width:500px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

.form input,
.form textarea{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:5px;
}

.form button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  color:black;
  cursor:pointer;
  border-radius:5px;
}

/* Social */
.social{
  margin-top:20px;
}

.social a{
  margin:10px;
  display:inline-block;
  color:#38bdf8;
}
</style>
</head>

<body>
<section class="contact">

<h1>Contact Us</h1>

<div class="form">
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <textarea id="message" placeholder="Your Message"></textarea>

  <button onclick="sendMsg()">Send Message</button>
</div>

<div class="social">
  <p>Or contact directly:</p>
  <a href="https://t.me/Asanti1883">Telegram</a>
</div>

</section>

<script>
function sendMsg(){

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let message=document.getElementById("message").value;

  if(name=="" || phone==""){
    alert("Please fill all fields");
    return;
  }

  let text="📩 New Contact:%0A";
  text+="Name: "+name+"%0A";
  text+="Phone: "+phone+"%0A";
  text+="Message: "+message;

  window.open(`https://t.me/Asanti883?text=${text}`);
}
</script>

</body>
</html>
