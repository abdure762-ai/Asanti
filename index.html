<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asanti Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: #fff;
}

/* Header */
.header {
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    padding: 20px 10%;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
}

.navbar a {
    margin-left: 20px;
    text-decoration: none;
    color: #fff;
    transition: 0.3s;
}

.navbar a:hover,
.navbar .active {
    color: #38bdf8;
}

/* Home Section */
.home {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 120px 10%;
    min-height: 100vh;
}

.home-content {
    max-width: 600px;
}

.home-content h3 {
    font-size: 20px;
}

.home-content h1 {
    font-size: 40px;
    margin: 10px 0;
    color: #38bdf8;
}

.highlight {
    color: #f59e0b;
}

.home-content p {
    margin: 15px 0;
    line-height: 1.6;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 10px 20px;
    background: #38bdf8;
    color: #000;
    border-radius: 8px;
    text-decoration: none;
    margin-top: 10px;
    transition: 0.3s;
}

.btn:hover {
    background: #0ea5e9;
}

/* Social Icons */
.social-media a {
    display: inline-block;
    margin: 10px;
}

.social-media img {
    width: 25px;
    transition: 0.3s;
}

.social-media img:hover {
    transform: scale(1.2);
}

/* Image */
.home-img img {
    width: 300px;
    border-radius: 50%;
    border: 4px solid #38bdf8;
}

/* Responsive */
@media (max-width: 768px) {
    .home {
        flex-direction: column;
        text-align: center;
    }

    .home-img img {
        margin-top: 20px;
    }
}
</style>

</head>

<body>

<header class="header">
    <a href="#" class="logo">Personal Homepage</a>

    <nav class="navbar">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="service.html">Service</a>
    </nav>
</header>

<section class="home">

    <div class="index-content">
        <h3>Hello, It's Me</h3>
        <h1>ASANTI YIRGU</h1>
        <h3>And I'm a <span class="highlight">Student</span></h3>

        <p>
            I enjoy music and use it as inspiration for my creativity.
            I am always ready to learn, grow, and improve my skills.
        </p>

    <div class="index-img">
        <img src="Asanti.jpg" alt="profile">
    </div>

</section>

</body>
</html>
