<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asanti Hair Shop</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#fff0f5}

/* Header */
header{
  background:#7c3aed;
  color:white;
  padding:12px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{font-size:22px;font-weight:bold}

.search{
  padding:8px;
  width:220px;
  border-radius:5px;
  border:none;
}

.cart{cursor:pointer}

/* Container */
.container{padding:20px}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

/* Card */
.card{
  background:white;
  padding:10px;
  border-radius:10px;
  transition:0.3s;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  background:#ddd;
}

.price{color:#db2777;font-weight:bold}

/* Buttons */
button{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.add{background:#ec4899;color:white}
.buy{background:#7c3aed;color:white}

/* Modal */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  width:90%;
  max-width:500px;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">💇 Asanti Hair Shop</div>
  <input class="search" placeholder="Search hair products..." onkeyup="search(this.value)">
  <div class="cart" onclick="toggleCart()">Cart (<span id="count">0</span>)</div>
  <nav class="navbar">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="service.html"class="active">Service</a>
    </nav>
</header>

<div class="container">
  <div class="grid" id="products"></div>
</div>

<div class="modal" id="cartModal">
  <div class="box">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <h4>Total: ETB <span id="total">0</span></h4>
    <button onclick="checkout()">Order Now</button>
    <button onclick="toggleCart()">Close</button>
  </div>
</div>

<script>
const products = [
{id:1,name:"Brazilian Hair",price:1500,img:"1.jpg"},
{id:2,name:"Wig Natural",price:1200,img:"2.jpg"},
{id:3,name:"Hair Oil",price:150,img:"3.jpg"},
{id:4,name:"Hair Shampoo",price:200,img:"4.jpg"},
{id:5,name:"Hair Conditioner",price:180,img:"5.jpg"},
{id:6,name:"Hair Dryer",price:900,img:"6.jpg"},
{id:7,name:"Hair Brush",price:80,img:"7.jpg"},
{id:8,name:"Hair Spray",price:120,img:"8.jpg"},
{id:9,name:"Hair Extensions",price:1300,img:"9.jpg"},
{id:10,name:"Hair Gel",price:90,img:"10.jpg"},
];

let cart=[];

function render(list=products){
  const box=document.getElementById("products");
  box.innerHTML="";
  list.forEach(p=>{
    box.innerHTML+=`
    <div class="card">
      <img src="${p.img || 'https://via.placeholder.com/300'}">
      <h4>${p.name}</h4>
      <div class="price">ETB ${p.price}</div>
      <button class="add" onclick="add(${p.id})">Add to Cart</button>
      <button class="buy" onclick="buyNow(${p.id})">Buy Now</button>
    </div>`;
  });
}

function search(q){
  render(products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));
}

function add(id){
  const p=products.find(x=>x.id==id);
  const e=cart.find(x=>x.id==id);
  e?e.qty++:cart.push({...p,qty:1});
  update();
}

function update(){
  document.getElementById("count").innerText=
    cart.reduce((a,b)=>a+b.qty,0);
}

function toggleCart(){
  const m=document.getElementById("cartModal");
  m.style.display=m.style.display==="flex"?"none":"flex";
  showCart();
}

function showCart(){
  const box=document.getElementById("cartItems");
  box.innerHTML="";
  let total=0;

  cart.forEach((c,i)=>{
    total+=c.price*c.qty;
    box.innerHTML+=`
      <p>${c.name} (ETB ${c.price}) x ${c.qty}
      <button onclick="removeItem(${i})">X</button></p>`;
  });

  document.getElementById("total").innerText=total;
}

function removeItem(i){
  cart.splice(i,1);
  showCart();
  update();
}

function buyNow(id){
  add(id);
  checkout();
}

/* Telegram Order */
function checkout(){
  if(cart.length==0){alert("Cart empty");return;}

  let message="💇‍ New Hair Order:%0A";
  let total=0;

  cart.forEach(c=>{
    message+=`${c.name} x${c.qty} - ETB ${c.price}%0A`;
    total+=c.price*c.qty;
  });

  message+=`Total: ETB ${total}`;

  window.open(`https://t.me/Asanti1883?text=${message}`);
}

render();
</script>

</body>
</html>
